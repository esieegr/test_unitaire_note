name: Tests JUnit CI
on:
    push:
        branches: [ main, master ]
    pull_request:
        branches: [ main, master ]
jobs:
    tests:
        runs-on: ubuntu-latest
            steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-java@v4
                    with:
                        distribution: temurin
                        java-version: '21'
                - name: Lancer les tests
                run: mvn --batch-mode test